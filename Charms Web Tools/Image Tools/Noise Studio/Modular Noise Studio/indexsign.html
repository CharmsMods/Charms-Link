<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closed for Development</title>
    <style>
        /* Modern reset and layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 6rem); /* Responsive typography */
            font-weight: 800;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 1rem;
            animation: fadeIn 1.5s ease-out forwards;
        }

        p {
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-weight: 300;
            color: #888;
            letter-spacing: 0.05em;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 0.5s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Prevent text selection to keep it feeling like a UI element */
        ::selection {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Closed for Development</h1>
        <p>Opening back up with new features soon</p>
    </div>

</body>
</html>
